<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL Hierarchy Resolver</title>
</head>
<body>
<h1>BFHL Hierarchy Resolver</h1>

<label for="data">Enter node list (one per line or JSON array):</label><br>
<textarea id="data" rows="10" cols="50">A->B
A->C
B->D
C->E
E->F
X->Y
Y->Z
Z->X
P->Q
Q->R
G->H
G->H
G->I
hello
1->2
A-></textarea><br><br>
<button id="run">Submit</button>
<button id="clear">Clear</button>

<div id="out"></div>

<script>
function parseInput(raw) {
  const t = raw.trim();
  if (t.startsWith("[")) { try { const a = JSON.parse(t); if (Array.isArray(a)) return a; } catch(e) {} }
  return t.split(/\r?\n/);
}

function renderTree(obj, indent) {
  let s = "";
  for (const k of Object.keys(obj || {})) {
    s += indent + k + "\n";
    s += renderTree(obj[k], indent + "  ");
  }
  return s;
}

function render(res) {
  const out = document.getElementById("out");
  let html = "<h2>Result</h2>";

  const s = res.summary || {};
  html += "<p><b>Trees:</b> " + (s.total_trees ?? 0) +
    " | <b>Cycles:</b> " + (s.total_cycles ?? 0) +
    " | <b>Largest tree root:</b> " + (s.largest_tree_root || "—") + "</p>";

  for (const h of (res.hierarchies || [])) {
    if (h.has_cycle) {
      html += "<h3>Root: " + h.root + " (cycle)</h3>";
      html += "<p>Cyclic group — no tree.</p>";
    } else {
      html += "<h3>Root: " + h.root + " (depth: " + h.depth + ")</h3>";
      html += "<pre>" + renderTree(h.tree, "") + "</pre>";
    }
  }

  const inv = res.invalid_entries || [];
  const dup = res.duplicate_edges || [];
  html += "<h3>Invalid entries (" + inv.length + ")</h3>";
  html += inv.length ? "<p>" + inv.map(x => x === "" ? '""' : x).join(", ") + "</p>" : "<p>None</p>";
  html += "<h3>Duplicate edges (" + dup.length + ")</h3>";
  html += dup.length ? "<p>" + dup.join(", ") + "</p>" : "<p>None</p>";

  html += "<hr><p><b>user_id:</b> " + (res.user_id || "") +
    " | <b>email:</b> " + (res.email_id || "") +
    " | <b>roll:</b> " + (res.college_roll_number || "") + "</p>";

  out.innerHTML = html;
}

document.getElementById("run").addEventListener("click", async function() {
  const btn = this;
  const data = parseInput(document.getElementById("data").value);
  btn.disabled = true;
  btn.textContent = "Loading...";
  document.getElementById("out").innerHTML = "<p>Calling API...</p>";
  try {
    const r = await fetch("/bfhl", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data })
    });
    const json = await r.json();
    render(json);
  } catch(err) {
    document.getElementById("out").innerHTML = "<p style='color:red'><b>Error:</b> " + err.message + "</p>";
  } finally {
    btn.disabled = false;
    btn.textContent = "Submit";
  }
});

document.getElementById("clear").addEventListener("click", function() {
  document.getElementById("data").value = "";
  document.getElementById("out").innerHTML = "";
});
</script>
</body>
</html>
